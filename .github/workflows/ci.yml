name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ── Job 1: Backend linting and type checking ──────────────────────────────
  backend-lint:
    name: Backend Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install lint dependencies
        run: pip install ruff mypy types-requests

      - name: Lint with ruff
        run: cd backend && ruff check .

      - name: Type check (non-blocking)
        run: cd backend && mypy . --ignore-missing-imports || true

  # ── Job 2: Backend tests ──────────────────────────────────────────────────
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r backend/requirements.txt pytest pytest-asyncio httpx

      - name: Run tests
        # Non-blocking until test suite is fully established
        run: cd backend && python -m pytest tests/ -v --tb=short || true

  # ── Job 3: Frontend build check ───────────────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend-next/package-lock.json

      - name: Install dependencies
        run: cd frontend-next && npm ci

      - name: Build
        run: cd frontend-next && npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

  # ── Job 4: Docker Compose validation ──────────────────────────────────────
  docker-validate:
    name: Docker Compose Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: docker compose config --quiet

      - name: Validate docker-compose.prod.yml
        run: docker compose -f docker-compose.prod.yml config --quiet
