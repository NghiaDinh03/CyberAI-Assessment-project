# =============================================================================
# CyberAI Assessment Platform — Production Nginx Configuration
# =============================================================================
# Upstreams : frontend (Next.js :3000) + backend (FastAPI :8000)
# Features  : rate limiting, gzip, security headers, WebSocket upgrade,
#             proxy timeouts, client body size cap
# =============================================================================

# ---------------------------------------------------------------------------
# Rate-limit zones
# ---------------------------------------------------------------------------
# Zone "api_limit": 10 MB shared memory, 30 req/s per client IP on /api/ paths
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

# Zone "global_limit": 20 MB shared memory, 100 req/s per client IP globally
limit_req_zone $binary_remote_addr zone=global_limit:20m rate=100r/s;

# ---------------------------------------------------------------------------
# Upstreams
# ---------------------------------------------------------------------------
upstream frontend {
    server frontend:3000;
    keepalive 16;
}

upstream backend {
    server backend:8000;
    keepalive 16;
}

# ---------------------------------------------------------------------------
# Gzip compression
# ---------------------------------------------------------------------------
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_buffers 16 8k;
gzip_http_version 1.1;
gzip_min_length 256;
gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/x-javascript
    application/xml
    application/xml+rss
    application/vnd.ms-fontobject
    application/x-font-ttf
    font/opentype
    image/svg+xml
    image/x-icon;

# ---------------------------------------------------------------------------
# HTTP server — redirect all plain HTTP to HTTPS
# ---------------------------------------------------------------------------
server {
    listen 80;
    server_name _;

    # ACME / Let's Encrypt challenge support
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------------------------------------------------------------------
# HTTPS server
# ---------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    server_name _;

    # ── TLS certificates (mount via Docker volume or update paths) ──────────
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # ── TLS hardening ────────────────────────────────────────────────────────
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;
    ssl_stapling              on;
    ssl_stapling_verify       on;

    # ── Client limits ────────────────────────────────────────────────────────
    client_max_body_size 50m;
    client_body_timeout  60s;
    client_header_timeout 30s;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options           "DENY"              always;
    add_header X-Content-Type-Options    "nosniff"           always;
    add_header X-XSS-Protection          "1; mode=block"     always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Content-Security-Policy
        "default-src 'self'; "
        "script-src 'self' 'unsafe-inline' 'unsafe-eval'; "
        "style-src 'self' 'unsafe-inline'; "
        "img-src 'self' data: blob:; "
        "font-src 'self' data:; "
        "connect-src 'self'; "
        "frame-ancestors 'none';"
        always;

    # ── Common proxy settings ─────────────────────────────────────────────────
    proxy_http_version      1.1;
    proxy_connect_timeout   60s;
    proxy_send_timeout      120s;
    proxy_read_timeout      120s;
    proxy_buffering         on;
    proxy_buffer_size       8k;
    proxy_buffers           8 32k;
    proxy_busy_buffers_size 64k;

    # Forward real client info
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSocket upgrade headers (used by /api/ streaming endpoints)
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    # ── /api/ — FastAPI backend ───────────────────────────────────────────────
    location /api/ {
        # Burst allows short spikes; nodelay prevents queuing
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://backend;
    }

    # ── /docs /redoc /openapi.json — FastAPI Swagger UI ──────────────────────
    location ~ ^/(docs|redoc|openapi\.json)$ {
        proxy_pass http://backend;
    }

    # ── Static assets — cache aggressively ───────────────────────────────────
    location ~* ^/_next/static/ {
        proxy_pass http://frontend;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # ── Everything else — Next.js frontend ───────────────────────────────────
    location / {
        limit_req zone=global_limit burst=50 nodelay;
        limit_req_status 429;

        proxy_pass http://frontend;
    }

    # ── Health check endpoint (no rate limit, no logging) ────────────────────
    location = /health {
        proxy_pass http://backend/health;
        access_log off;
    }

    # ── Deny hidden files (.env, .git, etc.) ─────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# ---------------------------------------------------------------------------
# WebSocket connection upgrade map
# ---------------------------------------------------------------------------
map $http_upgrade $connection_upgrade {
    default upgrade;
    ""      close;
}
